name: boatrace-tegatai-monitor

on:
  schedule:
    # GitHub Actionsのcronは UTC。JST=UTC+9。
    # JST 10:00〜24:00頃(=UTC 01:00〜15:00)を30分おきに巡回。
    # ※スケジュール実行は混雑時に数分ずれることがあります(仕様)。
    - cron: "*/30 1-15 * * *"
  workflow_dispatch: {}   # 手動実行も可

# state.json(重複通知防止)をコミットで戻すため書き込み権限が必要
permissions:
  contents: write

concurrency:
  group: boatrace-monitor
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run scan
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TZ: Asia/Tokyo
        run: python scan.py --dry-run

      - name: Commit dedup state
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update notified state [skip ci]"
            git push
          else
            echo "state.json 変更なし"
          fi
